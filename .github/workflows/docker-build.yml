name: Build and Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: miteshtrivedi10/aoe-agent-orchestrator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up existing GHCR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | cut -d'/' -f2)
          echo "::group::Listing existing package versions for $PACKAGE_NAME"
          VERSIONS_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/$PACKAGE_NAME/versions" \
            2>/dev/null || true)

          if [ -z "$VERSIONS_JSON" ] || [ "$VERSIONS_JSON" = "[]" ]; then
            echo "No existing versions found, skipping cleanup."
            echo "::endgroup::"
            exit 0
          fi

          VERSION_IDS=$(echo "$VERSIONS_JSON" | jq -r '.[].id')
          echo "Found versions: $(echo "$VERSION_IDS" | wc -l)"
          echo "::endgroup::"

          for VERSION_ID in $VERSION_IDS; do
            echo "Deleting version $VERSION_ID..."
            gh api --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/$PACKAGE_NAME/versions/$VERSION_ID?force=true" \
              --silent || echo "  (skip - may be in use)"
          done
          echo "Cleanup complete."

      - name: Build and push (no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
